<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manager Profile</title>

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../manager-css/manager_profile.css">
</head>
<body>

  <!-- Top Header -->
  <header class="top-header">
    <div class="logo">FashionFlex</div>
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search here...">
    </div>
    <div class="icons">
      <i class="fas fa-bell"></i>
      <i class="fas fa-user-circle"></i>
    </div>
  </header>

  <!-- Layout container -->
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <nav class="nav-links">
        <a href="manager.html">All</a>
        <a href="manager_profile.htm">profile</a>
        <a href="add store.html">Add Store</a>
        <a href="store list.html">Store List</a>
        <a href="user list.html">User List</a>
        <a href="tickets.html">Tickets</a>
        <a href="report.html">Reports</a>
        <a href="change psw.html">Change Password</a>
      </nav>
    </aside>

    <!-- Profile Form -->
    <section class="main-content">
      <div class="form-container">
        <h2>Manager Profile</h2>

        <div class="photo-upload">
          <label for="profilePic" class="upload-label">
            <div class="image-preview">
              <i class="fas fa-user-tie"></i>
            </div>
            <span><i class="fas fa-camera"></i> Upload Photo</span>
          </label>
          <input type="file" id="profilePic" accept="image/*" hidden>
        </div>

        <form class="admin-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Enter full name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
          </div>

          <div class="form-group">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" placeholder="10-digit number" pattern="[0-9]{10}" required>
          </div>

          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="">Select gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" min="18" max="50" placeholder="18–50" required>
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" rows="3" placeholder="Enter address" required></textarea>
          </div>

          <div class="form-group">
            <label for="zone">Zone</label>
            <select id="zone" required>
              <option value="">Select zone</option>
              <option>North</option>
              <option>South</option>
              <option>East</option>
              <option>West</option>
              <option>Central</option>
            </select>
          </div>

          <div class="button-group">
            <button type="submit" class="save-btn">Save Profile</button>
          </div>
        </form>
      </div>
    </section>
  </div>

</body>
</html>
