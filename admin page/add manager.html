 <!--! header ends hear  -->


  <div class="form-container">
    <h2>Add Manager</h2>

    <div class="photo-upload">
      <label for="manager-photo" class="upload-label">
        <div class="image-preview">
          <i class="fas fa-user"></i>
        </div>
        <span><i class="fas fa-camera"></i> Upload Photo</span>
      </label>
      <input type="file" id="manager-photo" accept="image/*" hidden>
    </div>

    <form class="manager-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter email" required>
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" placeholder="Enter contact number" required>
      </div>

      <div class="form-group">
        
  
          <label>Gender</label>
        <div class="radio-group">
        
          <label><input type="radio" name="gender" value="male"> Male</label>
          <label><input type="radio" name="gender" value="female"> Female</label>
          <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="tel" placeholder="Enter contact number" required>
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea rows="3" placeholder="Enter address" required></textarea>
      </div>

      

      <div class="form-group">
        <label>Zone</label>
        <select required>
          <option value="">Select zone</option>
          <option>North</option>
          <option>South</option>
          <option>East</option>
          <option>West</option>
          <option>Central</option>
        </select>
      </div>



      <div class="form-group">
        <label>Create Password</label>
        <input type="password" placeholder="Create a password" required>
      </div>

      <div class="form-group">
        <button type="submit">Add Manager</button>
      </div>
    </form>
  </div>
</body>
</html>
