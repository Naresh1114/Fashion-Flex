<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Password</title>
<link rel="stylesheet" href="change_psw.css">
<link rel="stylesheet" href="../store-css/change_psw.css">
</head>
<body>
  <div class="container">
    <h1>Change Password</h1>
    <form id="changeForm" >
      <div class="form-group">
        <label>Email:</label>
        <input type="email" placeholder="your@email.com">
      </div>
      <button type="button" class="send-otp">Send OTP</button>

      <div class="form-group">
        <label>OTP:</label>
        <input type="text" placeholder="Enter OTP">
      </div>

      <div class="form-group">
        <label>New Password:</label>
        <input type="password" placeholder=".............">
      </div>

      <div class="form-group">
        <label>Confirm Password:</label>
        <input type="password" placeholder=".............">
      </div>

      <button type="submit" class="submit-btn">
        <a href="item listing page.html"><a href="item listing page.html">Update Password</a></a>
      </button>
    </form>
  </div>
</body>
</html>
