<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Bootstrap + Icons -->
  <link rel="stylesheet" href="../css/bootstrap.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.0.0/remixicon.min.css" />
  <link rel="stylesheet" href="../store-css/profile.css" />
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="../css/bootstrap.css">
  <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>
<body>

  
<!--! Header with logo, search, icons, and bottom nav -->
<header>
  <div class="header-top">
    <div class="logo">FashionFlex</div>
    <div class="search-bar">
      <input type="text" placeholder="Search...">
    </div>
    <div class="icons">
      <i class="fas fa-bell"></i>
      <!--! pop up  -->
      <!-- Logout Button -->
            <div class="logout-container">
                <button type="button" class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#logoutModal">
                  Logout
                </button>
            </div>
        </nav>

<!-- Logout Modal (outside sidebar) -->
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="logoutModalLabel" style="color: black;">Logout</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" style="color: black;">
            Are you sure you want to logout?
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
            <button type="button" class="btn btn-primary"  style="color: white;"><a href="../FRONT END USING HTML/login.html">yes</a> </button>
          </div>
        </div>
      </div>
    </div>
      <!--! pop up  -->
  
    </div>
  </div>

  <div class="nav-links-container">
    <nav class="nav-links">
      <a href="item-listing-page.html">All</a>
      <a href="profile.html">Profile</a>
      <a href="add-items.html">Add Items</a>
      <a href="item-list.html">Item List</a>
      <a href="order.html">Order</a>
      <a href="user.html">User List</a>
      <a href="history.html">History</a>
      <a href="review.html">Review</a>
      <a href="tracking.html">Tracking</a>
      <a href="return.html">Return</a>
      <a href="transaction.html">Transaction</a>
    </nav>
  </div>
</header>

<main>
  <div class="main-wrapper">
    
    <!-- 65vw Form Section -->
    <section class="profile-container container py-4">
  <h1 class="text-center mb-4">FashionFlex</h1>

  <!-- Image -->
  <div class="profile-photo text-center mb-4 position-relative">
    <img src="profile img/freshers pic.jpg" alt="Store Image" id="profileImage" class="rounded-circle" style="width: 120px; height: 120px; object-fit: cover;" />
    <label for="fileUpload" class="edit-icon position-absolute" style="bottom: 10px; right: 10px; cursor: pointer;">
      <i class="ri-edit-2-line fs-5 bg-white p-1 rounded-circle"></i>
    </label>
    <input type="file" id="fileUpload" hidden />
  </div>

  <form class="profile-form row g-3">
    <!-- Store Name -->
    <div class="col-md-6">
      <label>Store Name</label>
      <input type="text" name="storeName" class="form-control" placeholder="FashionFlex Store" required />
    </div>

    <!-- Owner Name -->
    <div class="col-md-6">
      <label>Owner Name</label>
      <input type="text" name="ownerName" class="form-control" placeholder="John Doe" required />
    </div>

    <!-- Password -->
    <div class="col-md-6">
      <label>Password</label>
      <input type="password" name="password" class="form-control" placeholder="••••••••" required />
    </div>

    <!-- Email ID -->
    <div class="col-md-6">
      <label>Email ID</label>
      <input type="email" name="email" class="form-control" placeholder="store@example.com" required />
    </div>

    <!-- Contact Number -->
    <div class="col-md-6">
      <label>Contact Number</label>
      <input type="tel" name="contact" class="form-control" placeholder="+91 9876543210" required />
    </div>

    <!-- Address -->
    <div class="col-md-6">
      <label>Address</label>
      <input type="text" name="address" class="form-control" placeholder="123, Street Name, City" />
    </div>

    <!-- Zone -->
    <div class="col-md-6">
      <label>Zone</label>
      <input type="text" name="zone" class="form-control" placeholder="East / West / North / South" />
    </div>

   

    

    

    <!-- Submit -->
    <div class="col-md-12">
      <button type="submit" class="btn btn-success w-100">Update Profile</button>
    </div>
  </form>
</section>


    <!-- 35vw Image Section -->
    <div class="profile-side-image">
      <img src="../images/store-imgs/profile img.avif" alt="Store Banner"   />
    </div>
  </div>
</main>

<footer>
  <div class="footer-container">
    <div class="footer-bottom">&copy; 2025 MyCompany. All rights reserved.</div>
  </div>
</footer>


</body>
</html>
