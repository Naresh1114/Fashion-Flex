<!--! add items form starts  -->
<div id="additem-wrapper">
    
    <!-- Blurred background layer -->
    <div class="additem-bg-blur"></div>

    <!-- Main form layout -->
    <main class="additem-form-wrapper">
      <section class="additem-full-container">
        <h1 class="text-center mb-4">Add Product</h1>

        <form class="additem-form p-4">
  <!-- Upload Multiple Images -->
  <div class="mb-3">
    <label>Upload Images</label>
    <input type="file" class="form-control" multiple  id="img"/>
  </div>

  <!-- Item Name -->
  <div class="mb-3">
    <label>Item Name</label>
    <input type="text" class="form-control" placeholder="Enter item name"  id="name"/>
  </div>

  <!-- Size (Dropdown) -->
  <div class="mb-3">
    <label>Size</label>
    <select class="form-control">
      <option value="">Select Size</option>
      <option>S</option>
      <option>M</option>
      <option>L</option>
      <option>XL</option>
    </select>
  </div>

  <!-- Color (Dropdown) -->
  <div class="mb-3">
    <label>Color</label>
    <select class="form-control">
      <option value="">Select Color</option>
      <option>Red</option>
      <option>Blue</option>
      <option>Black</option>
      <option>White</option>
      <option>Green</option>
    </select>
  </div>

  <!-- Price Per Day -->
  <div class="mb-3">
    <label>Price Per Day (₹)</label>
    <input type="number" class="form-control" placeholder="Enter price per day" />
  </div>

  <!-- Gender (Dropdown) -->
  <div class="mb-3">
    <label>Gender</label>
    <select class="form-control">
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>

  <!-- Category (Dropdown) -->
  <div class="mb-3">
    <label>Category</label>
    <select class="form-control">
      <option value="" disabled selected>Select Category</option>
      <option>Traditional</option>
      <option>wedding</option>
      <option>partyware </option>
      <option>Ethnic</option>
      <option>kids wear</option>
      
    </select>
  </div>

  <!-- Brand (Dropdown) -->
  <div class="mb-3">
    <label>Brand</label>
    <select class="form-control">
      <option value="">Select Brand</option>
      <option>Nike</option>
      <option>Puma</option>
      <option>Zara</option>
      <option>Levis</option>
      <option>H&M</option>
      <option>Allen Solly</option>
      <option>Roadster</option>
    </select>
  </div>

  <!-- Fit Size Number (Dropdown) -->
  <div class="mb-3">
    <label>Fit Size</label>
    <select class="form-control">
      <option value="">Select Fit Size</option>
      <option>36</option>
      <option>38</option>
      <option>40</option>
      <option>42</option>
      <option>44</option>
    </select>
  </div>

  <!-- Quantity -->
  <div class="mb-3">
    <label>Quantity</label>
    <input type="number" class="form-control" placeholder="Enter quantity" />
  </div>

  <!-- Description -->
  <div class="mb-4">
    <label>Description</label>
    <textarea class="form-control" placeholder="Enter product description..." rows="3"></textarea>
  </div>

  <!-- Submit Button -->
  <div class="text-center">
    <button type="submit" class="btn btn-success px-5">Add Product</button>
  </div>
</form>

      </section>
    </main>

  </div>
<!--! add items form ends  -->
